name: "SEO: Post-merge checks"

on:
  push:
    branches: {{PUSH_BRANCHES}}

env:
  SEO_LANE: merge

jobs:
  seo-tests:
    name: Full integration checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
{{SERVER_STEP}}
      - name: Run SEO tests (shard ${{ matrix.shard }}/4)
        continue-on-error: true
        run: npx playwright test --project=unit --project=integration --shard=${{ matrix.shard }}/4 --reporter=blob {{CONFIG_FLAG}}
        env:
          SEO_LANE: merge
          TEST_BASE_URL: {{TEST_BASE_URL}}
          PROD_BASE_URL: {{PROD_BASE_URL}}
          SEO_CANONICAL_MODE: {{SEO_CANONICAL_MODE}}
          PLAYWRIGHT_BLOB_OUTPUT_DIR: blob-report

      - name: Upload blob report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: blob-report-push-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge reports
    needs: seo-tests
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v6
        with:
          path: all-blob-reports
          pattern: blob-report-push-*
          merge-multiple: true

      - name: Merge reports
        continue-on-error: true
        run: npx playwright merge-reports --reporter=html,{{REPORTER_PATH}} ./all-blob-reports

      - name: Enforce SEO Gate & Print Summary
        run: |
          if [ ! -f test-results/seo-summary.json ]; then
            echo "❌ FATAL: seo-summary.json not found. The test run may have crashed."
            exit 1
          fi
          
          # Print the markdown summary to the workflow log
          cat test-results/seo-summary.md
          
          # Publish the markdown summary to the GitHub Actions UI (PR/Run Summary Page)
          cat test-results/seo-summary.md >> $GITHUB_STEP_SUMMARY
          
          BLOCKERS=$(node -p "require('./test-results/seo-summary.json').blockers")
          if [ "$BLOCKERS" -gt 0 ]; then
            echo "❌ FAILED: $BLOCKERS blocker(s) found. You must fix these before merging."
            exit 1
          else
            WARNINGS=$(node -p "require('./test-results/seo-summary.json').warnings")
            if [ "$WARNINGS" -gt 0 ]; then
              echo "⚠️ PASSED (with warnings): No blockers found, but $WARNINGS warning(s) should be reviewed."
            else
              echo "✅ PASSED: All checks passed. No blockers or warnings found."
            fi
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v6
        with:
          name: seo-test-report-push
          path: playwright-report/
          retention-days: 14
