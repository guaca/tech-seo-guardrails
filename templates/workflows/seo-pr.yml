name: "SEO: PR Checks"

on:
  pull_request:
{{PR_BRANCHES_LINE}}

env:
  SEO_LANE: pr

jobs:
  # Determine which tests to run based on changed files
  select-tests:
    name: Select test scope
    runs-on: ubuntu-latest
    outputs:
      test-args: ${{ steps.select.outputs.args }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - id: select
        run: |
          chmod +x {{SELECT_TESTS_PATH}}
          ARGS=$(BASE_BRANCH=origin/${{ github.base_ref }} {{SELECT_TESTS_PATH}})
          echo "args=$ARGS" >> "$GITHUB_OUTPUT"
          echo "Selected tests: $ARGS"

  seo-tests:
    name: Run SEO checks
    needs: select-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
{{SERVER_STEP}}
      - name: Run SEO tests (shard ${{ matrix.shard }}/2)
        run: npx playwright test ${{ needs.select-tests.outputs.test-args }} --shard=${{ matrix.shard }}/2 --reporter=blob {{CONFIG_FLAG}}
        continue-on-error: true
        env:
          SEO_LANE: pr
          TEST_BASE_URL: ${{ env.PREVIEW_URL }}
          PROD_BASE_URL: {{PROD_BASE_URL}}
          SEO_CANONICAL_MODE: {{SEO_CANONICAL_MODE}}
          PLAYWRIGHT_BLOB_OUTPUT_DIR: blob-report

      - name: Upload blob report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1

  merge-reports:
    name: Merge test reports
    needs: seo-tests
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - name: Download blob reports
        uses: actions/download-artifact@v6
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge reports
        continue-on-error: true
        run: npx playwright merge-reports --reporter=html,{{REPORTER_PATH}} ./all-blob-reports

      - name: Enforce SEO Gate & Print Summary
        run: |
          if [ ! -f test-results/seo-summary.json ]; then
            echo "❌ FATAL: seo-summary.json not found. The test run may have crashed."
            exit 1
          fi
          
          # Print the markdown summary to the workflow log
          cat test-results/seo-summary.md
          
          # Publish the markdown summary to the GitHub Actions UI (PR/Run Summary Page)
          cat test-results/seo-summary.md >> $GITHUB_STEP_SUMMARY
          
          BLOCKERS=$(node -p "require('./test-results/seo-summary.json').blockers")
          if [ "$BLOCKERS" -gt 0 ]; then
            echo "❌ FAILED: $BLOCKERS blocker(s) found. You must fix these before merging."
            exit 1
          else
            WARNINGS=$(node -p "require('./test-results/seo-summary.json').warnings")
            if [ "$WARNINGS" -gt 0 ]; then
              echo "⚠️ PASSED (with warnings): No blockers found, but $WARNINGS warning(s) should be reviewed."
            else
              echo "✅ PASSED: All checks passed. No blockers or warnings found."
            fi
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v6
        with:
          name: seo-test-report-pr
          path: playwright-report/
          retention-days: 14

      - name: Upload SEO summary
        uses: actions/upload-artifact@v6
        with:
          name: seo-summary
          path: |
            test-results/seo-summary.md
            test-results/seo-summary.json
          retention-days: 14

      - name: Post PR comment with summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const summary = fs.existsSync('test-results/seo-summary.md')
              ? fs.readFileSync('test-results/seo-summary.md', 'utf-8')
              : 'SEO summary report not available.';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary,
            });
