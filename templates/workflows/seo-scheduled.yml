name: "SEO: Scheduled (sitemap & link health)"

on:
  schedule:
    # Run at 3:00 AM UTC every Sunday
    - cron: '0 3 * * 0'
  workflow_dispatch:

env:
  SEO_LANE: scheduled

jobs:
  seo-tests:
    name: Full suite (unit + integration + e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run all SEO tests (unit + integration + e2e)
        continue-on-error: true
        run: npx playwright test --project=unit --project=integration --project=e2e {{CONFIG_FLAG}}
        env:
          SEO_LANE: scheduled
          PROD_BASE_URL: {{PROD_BASE_URL}}
          SEO_CANONICAL_MODE: {{SEO_CANONICAL_MODE}}

      - name: Enforce SEO Gate & Print Summary
        run: |
          if [ ! -f test-results/seo-summary.json ]; then
            echo "❌ FATAL: seo-summary.json not found. The test run may have crashed."
            exit 1
          fi
          
          # Print the markdown summary to the workflow log
          cat test-results/seo-summary.md
          
          # Publish the markdown summary to the GitHub Actions UI (PR/Run Summary Page)
          cat test-results/seo-summary.md >> $GITHUB_STEP_SUMMARY
          
          BLOCKERS=$(node -p "require('./test-results/seo-summary.json').blockers")
          if [ "$BLOCKERS" -gt 0 ]; then
            echo "❌ FAILED: $BLOCKERS blocker(s) found. You must fix these before merging."
            exit 1
          else
            WARNINGS=$(node -p "require('./test-results/seo-summary.json').warnings")
            if [ "$WARNINGS" -gt 0 ]; then
              echo "⚠️ PASSED (with warnings): No blockers found, but $WARNINGS warning(s) should be reviewed."
            else
              echo "✅ PASSED: All checks passed. No blockers or warnings found."
            fi
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: seo-test-report-scheduled
          path: playwright-report/
          retention-days: 30

      - name: Upload SEO summary
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: seo-summary-scheduled
          path: test-results/seo-summary.md
          retention-days: 30

      - name: Upload SEO summary JSON
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: seo-summary-json-scheduled
          path: test-results/seo-summary.json
          retention-days: 30

      - name: Store results for trend tracking
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: seo-results-${{ github.run_number }}
          path: test-results/
          retention-days: 90

      - name: Create GitHub issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -f test-results/seo-summary.json ]; then
            BLOCKERS=$(node -e "const d=JSON.parse(require('fs').readFileSync('test-results/seo-summary.json','utf-8')); console.log(d.blockers)")
            WARNINGS=$(node -e "const d=JSON.parse(require('fs').readFileSync('test-results/seo-summary.json','utf-8')); console.log(d.warnings)")
            SUMMARY_LINE="**Blockers:** ${BLOCKERS}  |  **Warnings:** ${WARNINGS}"
          else
            SUMMARY_LINE="_(seo-summary.json not found — reporter may have crashed)_"
          fi

          gh issue create \
            --title "Scheduled SEO check failed — ${DATE}" \
            --label "seo-regression" \
            --body "## Scheduled SEO regression detected

          ${SUMMARY_LINE}

          **Workflow run:** [View full details](${RUN_URL})

          This issue was created automatically by the scheduled SEO workflow. Investigate the linked run for test-by-test results and fix any blockers before the next release window."
